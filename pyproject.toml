[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["skills/orchestrate-game-design/tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
  "-ra",
  "--strict-config",
  "--strict-markers",
]
markers = [
  "integration: exercises multiple scripts or a complete artifact workflow",
  "platform: exercises operating-system-specific filesystem behavior",
]
